<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="igBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#833ab4"/>
      <stop offset="50%" stop-color="#fd1d1d"/>
      <stop offset="100%" stop-color="#fcb045"/>
    </linearGradient>
    <linearGradient id="igGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#833ab4"/>
      <stop offset="50%" stop-color="#fd1d1d"/>
      <stop offset="100%" stop-color="#fcb045"/>
    </linearGradient>
    <linearGradient id="igCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
    <linearGradient id="igPost1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcb045"/>
      <stop offset="100%" stop-color="#fd1d1d"/>
    </linearGradient>
    <linearGradient id="igPost2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#833ab4"/>
      <stop offset="100%" stop-color="#fd1d1d"/>
    </linearGradient>
    <linearGradient id="igPost3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fd1d1d"/>
      <stop offset="100%" stop-color="#fcb045"/>
    </linearGradient>
    <linearGradient id="igPost4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a3093"/>
      <stop offset="100%" stop-color="#a044ff"/>
    </linearGradient>
    <linearGradient id="igPost5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7797d"/>
      <stop offset="100%" stop-color="#fcb045"/>
    </linearGradient>
    <linearGradient id="igPost6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fd1d1d"/>
      <stop offset="100%" stop-color="#833ab4"/>
    </linearGradient>
    <linearGradient id="igPost7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcb045"/>
      <stop offset="100%" stop-color="#833ab4"/>
    </linearGradient>
    <linearGradient id="igPost8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a044ff"/>
      <stop offset="100%" stop-color="#f7797d"/>
    </linearGradient>
    <linearGradient id="igPost9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fd1d1d"/>
      <stop offset="100%" stop-color="#6a3093"/>
    </linearGradient>
    <filter id="igShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="igGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="675" fill="url(#igBg)"/>
  <rect width="1200" height="675" fill="#000000" opacity="0.15"/>

  <!-- Top header -->
  <rect x="0" y="0" width="1200" height="70" fill="#ffffff" opacity="0.1"/>

  <!-- Instagram logo (camera outline with gradient) -->
  <g transform="translate(40, 18)">
    <rect x="0" y="0" width="40" height="40" rx="11" fill="none" stroke="url(#igGradient)" stroke-width="3.5"/>
    <circle cx="20" cy="20" r="9" fill="none" stroke="url(#igGradient)" stroke-width="3.5"/>
    <circle cx="30" cy="10" r="2.5" fill="url(#igGradient)"/>
  </g>
  <text x="100" y="48" font-family="Billabong, Brush Script MT, cursive" font-size="38" fill="#ffffff" font-style="italic" font-weight="bold">Instagram</text>

  <!-- Top right icons -->
  <g transform="translate(1050, 22)">
    <!-- Heart -->
    <path d="M 18 30 C 18 30 5 20 5 12 C 5 6 10 4 14 8 L 18 12 L 22 8 C 26 4 31 6 31 12 C 31 20 18 30 18 30 Z" fill="#ffffff"/>
  </g>
  <g transform="translate(1110, 22)">
    <!-- Message -->
    <path d="M 2 5 L 32 5 Q 36 5 36 9 L 36 25 Q 36 29 32 29 L 20 29 L 14 35 L 14 29 L 6 29 Q 2 29 2 25 Z" fill="#ffffff"/>
  </g>
  <circle cx="1170" cy="40" r="18" fill="url(#igGradient)"/>

  <!-- Left sidebar -->
  <rect x="0" y="70" width="240" height="605" fill="#ffffff" opacity="0.08"/>

  <!-- Profile section in sidebar -->
  <g transform="translate(30, 110)">
    <circle cx="35" cy="35" r="35" fill="url(#igGradient)" opacity="0.4"/>
    <circle cx="35" cy="35" r="30" fill="#ffffff"/>
    <text x="35" y="44" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#833ab4" text-anchor="middle">K</text>
    <text x="85" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">khalid.dev</text>
    <text x="85" y="52" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.8">Khalid • Developer</text>
  </g>

  <!-- Sidebar nav items -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#ffffff">
    <text x="40" y="220">🏠 Home</text>
    <text x="40" y="260">🔍 Search</text>
    <text x="40" y="300">🧭 Explore</text>
    <text x="40" y="340">📹 Reels</text>
    <text x="40" y="380">💬 Messages</text>
    <text x="40" y="420">❤️ Notifications</text>
    <text x="40" y="460">➕ Create</text>
    <text x="40" y="500">👤 Profile</text>
  </g>

  <!-- Stories row -->
  <g transform="translate(270, 95)">
    <!-- Story 1 -->
    <circle cx="35" cy="35" r="32" fill="url(#igGradient)"/>
    <circle cx="35" cy="35" r="27" fill="#ffffff"/>
    <circle cx="35" cy="35" r="22" fill="url(#igPost1)"/>
    <text x="35" y="85" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">you</text>
    <!-- Story 2 -->
    <circle cx="115" cy="35" r="32" fill="url(#igGradient)"/>
    <circle cx="115" cy="35" r="27" fill="#ffffff"/>
    <circle cx="115" cy="35" r="22" fill="url(#igPost2)"/>
    <text x="115" y="85" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">sara</text>
    <!-- Story 3 -->
    <circle cx="195" cy="35" r="32" fill="url(#igGradient)"/>
    <circle cx="195" cy="35" r="27" fill="#ffffff"/>
    <circle cx="195" cy="35" r="22" fill="url(#igPost3)"/>
    <text x="195" y="85" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">ahmed</text>
    <!-- Story 4 -->
    <circle cx="275" cy="35" r="32" fill="url(#igGradient)"/>
    <circle cx="275" cy="35" r="27" fill="#ffffff"/>
    <circle cx="275" cy="35" r="22" fill="url(#igPost4)"/>
    <text x="275" y="85" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">leo</text>
    <!-- Story 5 -->
    <circle cx="355" cy="35" r="32" fill="url(#igGradient)"/>
    <circle cx="355" cy="35" r="27" fill="#ffffff"/>
    <circle cx="355" cy="35" r="22" fill="url(#igPost5)"/>
    <text x="355" y="85" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">maya</text>
  </g>

  <!-- 3x3 Post Grid -->
  <g filter="url(#igShadow)" transform="translate(270, 200)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="200" height="200" rx="4" fill="url(#igPost1)"/>
    <rect x="0" y="0" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
    <rect x="210" y="0" width="200" height="200" rx="4" fill="url(#igPost2)"/>
    <rect x="210" y="0" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
    <rect x="420" y="0" width="200" height="200" rx="4" fill="url(#igPost3)"/>
    <rect x="420" y="0" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
    <!-- Row 2 -->
    <rect x="0" y="210" width="200" height="200" rx="4" fill="url(#igPost4)"/>
    <rect x="0" y="210" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
    <rect x="210" y="210" width="200" height="200" rx="4" fill="url(#igPost5)"/>
    <rect x="210" y="210" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
    <rect x="420" y="210" width="200" height="200" rx="4" fill="url(#igPost6)"/>
    <rect x="420" y="210" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
    <!-- Row 3 -->
    <rect x="0" y="420" width="200" height="200" rx="4" fill="url(#igPost7)"/>
    <rect x="0" y="420" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
    <rect x="210" y="420" width="200" height="200" rx="4" fill="url(#igPost8)"/>
    <rect x="210" y="420" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
    <rect x="420" y="420" width="200" height="200" rx="4" fill="url(#igPost9)"/>
    <rect x="420" y="420" width="200" height="200" rx="4" fill="#000" opacity="0.05"/>
  </g>

  <!-- Right side: post engagement mockup -->
  <g transform="translate(940, 200)" filter="url(#igShadow)">
    <rect x="0" y="0" width="230" height="420" rx="12" fill="url(#igCard)"/>
    <!-- Header -->
    <circle cx="30" cy="30" r="20" fill="url(#igGradient)"/>
    <text x="60" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#262626">khalid.dev</text>
    <text x="60" y="44" font-family="Arial, sans-serif" font-size="11" fill="#8e8e8e">Jeddah, Saudi Arabia</text>
    <text x="200" y="32" font-family="Arial, sans-serif" font-size="20" fill="#262626">⋯</text>
    <!-- Image -->
    <rect x="10" y="60" width="210" height="220" fill="url(#igPost2)"/>
    <!-- Heart overlay -->
    <g transform="translate(110, 170)" opacity="0.9">
      <path d="M 0 0 C 0 0 -20 -15 -20 -28 C -20 -38 -10 -42 -3 -35 L 0 -32 L 3 -35 C 10 -42 20 -38 20 -28 C 20 -15 0 0 0 0 Z" fill="#ffffff" transform="scale(1.5)"/>
    </g>
    <!-- Action buttons -->
    <g transform="translate(20, 300)">
      <!-- Heart -->
      <path d="M 10 20 C 10 20 0 13 0 7 C 0 3 4 1 7 4 L 10 7 L 13 4 C 16 1 20 3 20 7 C 20 13 10 20 10 20 Z" fill="#fd1d1d"/>
      <!-- Comment -->
      <g transform="translate(35, 0)">
        <path d="M 2 2 L 18 2 Q 22 2 22 6 L 22 16 Q 22 20 18 20 L 11 20 L 6 25 L 6 20 L 4 20 Q 0 20 0 16 L 0 6 Q 0 2 4 2 Z" fill="none" stroke="#262626" stroke-width="2"/>
      </g>
      <!-- Share (paper plane) -->
      <g transform="translate(70, 0)">
        <path d="M 0 12 L 25 2 L 13 25 L 10 15 Z" fill="none" stroke="#262626" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <!-- Bookmark -->
      <g transform="translate(170, 0)">
        <path d="M 2 2 L 18 2 L 18 22 L 10 16 L 2 22 Z" fill="none" stroke="#262626" stroke-width="2" stroke-linejoin="round"/>
      </g>
    </g>
    <text x="20" y="345" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#262626">2,847 likes</text>
    <text x="20" y="365" font-family="Arial, sans-serif" font-size="12" fill="#262626"><tspan font-weight="bold">khalid.dev</tspan> Building cool things ✨</text>
    <text x="20" y="385" font-family="Arial, sans-serif" font-size="11" fill="#8e8e8e">View all 124 comments</text>
    <text x="20" y="405" font-family="Arial, sans-serif" font-size="11" fill="#8e8e8e">2 hours ago</text>
  </g>

  <!-- Bottom label -->
  <text x="600" y="660" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.85" text-anchor="middle">Instagram Clone • Built with React, Firebase &amp; Tailwind CSS</text>
</svg>
