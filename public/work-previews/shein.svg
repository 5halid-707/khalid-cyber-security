        <path d="M 10 16 C 10 16 4 11 4 7 C 4 5 6 4 8 5.5 L 10 7.5 L 12 5.5 C 14 4 16 5 16 7 C 16 11 10 16 10 16 Z" fill="#ee296d"/>
      </g>
      <text x="12" y="225" font-family="Arial, sans-serif" font-size="11" fill="#999">SHEIN</text>
      <text x="12" y="245" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#000">Pink Heel Pumps</text>
      <text x="12" y="270" font-family="Arial, sans-serif" font-size="11" fill="#999">★★★★★ <tspan fill="#ee296d">(1.8k)</tspan></text>
      <text x="12" y="298" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000">$18.99</text>
      <text x="75" y="298" font-family="Arial, sans-serif" font-size="12" fill="#999" text-decoration="line-through">$42.00</text>
      <text x="12" y="315" font-family="Arial, sans-serif" font-size="10" fill="#ee296d" font-weight="bold">⚡ Best seller</text>
    </g>

