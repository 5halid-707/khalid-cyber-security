      <path d="M 5 12 L 5 35 L 30 35 L 30 12 Z" fill="none" stroke="url(#snPink)" stroke-width="2.5"/>
      <path d="M 10 12 L 10 8 Q 10 0 17.5 0 Q 25 0 25 8 L 25 12" fill="none" stroke="url(#snPink)" stroke-width="2.5"/>
      <text x="17.5" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#snPink)" text-anchor="middle">2</text>
    </g>
    <text x="120" y="630" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Free Shipping on Orders $49+  •  Free Returns Within 35 Days</text>
    <g transform="translate(980, 610)">
      <rect width="150" height="32" rx="16" fill="url(#snPink)" filter="url(#snPinkGlow)"/>
      <text x="75" y="21" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Shop Now →</text>
    </g>
  </g>

  <!-- Bottom label -->
  <text x="600" y="668" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">© SHEIN Clone Project • Built with React, Next.js &amp; Stripe</text>
</svg>
