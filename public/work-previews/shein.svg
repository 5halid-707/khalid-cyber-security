    <rect x="0" y="0" width="100" height="36" rx="18" fill="url(#snBlack)"/>
    <text x="50" y="23" text-anchor="middle" fill="#ffffff" font-weight="bold">👗 Dresses</text>

    <rect x="115" y="0" width="80" height="36" rx="18" fill="#f5f5f5"/>
    <text x="155" y="23" text-anchor="middle" fill="#333" font-weight="500">👕 Tops</text>

    <rect x="210" y="0" width="90" height="36" rx="18" fill="#f5f5f5"/>
    <text x="255" y="23" text-anchor="middle" fill="#333" font-weight="500">👔 Shirts</text>

    <rect x="315" y="0" width="80" height="36" rx="18" fill="#f5f5f5"/>
    <text x="355" y="23" text-anchor="middle" fill="#333" font-weight="500">👟 Shoes</text>

    <rect x="410" y="0" width="90" height="36" rx="18" fill="#f5f5f5"/>
    <text x="455" y="23" text-anchor="middle" fill="#333" font-weight="500">👜 Bags</text>

