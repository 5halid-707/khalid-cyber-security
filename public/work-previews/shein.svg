    <g transform="translate(685, 250)">
      <rect width="200" height="320" rx="8" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="200" rx="8" fill="url(#snProduct4)"/>
      <!-- Bag silhouette -->
      <g transform="translate(65, 45)">
        <!-- Handle -->
        <path d="M 15 25 Q 15 0 35 0 Q 55 0 55 25" stroke="#000" stroke-width="5" fill="none"/>
        <!-- Bag body -->
        <rect x="0" y="20" width="70" height="100" rx="6" fill="url(#snPink)"/>
        <!-- Front pocket -->
        <rect x="10" y="60" width="50" height="40" rx="4" fill="url(#snPinkSoft)"/>
        <!-- Strap detail -->
        <rect x="0" y="20" width="70" height="6" fill="#d61f5c"/>
        <!-- Buckle -->
        <rect x="30" y="55" width="10" height="8" fill="#000"/>
      </g>
      <g transform="translate(10, 10)">
        <rect width="55" height="20" rx="3" fill="url(#snPink)"/>
        <text x="27" y="14" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">-30%</text>
      </g>
      <g transform="translate(170, 12)">
        <circle cx="10" cy="10" r="10" fill="#ffffff"/>
        <path d="M 10 16 C 10 16 4 11 4 7 C 4 5 6 4 8 5.5 L 10 7.5 L 12 5.5 C 14 4 16 5 16 7 C 16 11 10 16 10 16 Z" fill="none" stroke="#999" stroke-width="1.5"/>
      </g>
      <text x="12" y="225" font-family="Arial, sans-serif" font-size="11" fill="#999">SHEIN</text>
      <text x="12" y="245" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#000">Tote Handbag Pink</text>
      <text x="12" y="270" font-family="Arial, sans-serif" font-size="11" fill="#999">★★★★☆ <tspan fill="#ee296d">(643)</tspan></text>
      <text x="12" y="298" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000">$15.99</text>
      <text x="70" y="298" font-family="Arial, sans-serif" font-size="12" fill="#999" text-decoration="line-through">$22.99</text>
      <text x="12" y="315" font-family="Arial, sans-serif" font-size="10" fill="#ee296d" font-weight="bold">⚡ New arrival</text>
    </g>

    <!-- Product 5: Skirt -->
    <g transform="translate(900, 250)">
      <rect width="200" height="320" rx="8" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="200" rx="8" fill="url(#snProduct5)"/>
      <!-- Skirt silhouette -->
