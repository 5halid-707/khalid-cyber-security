    <path d="M 5 12 L 5 35 L 30 35 L 30 12 Z" fill="none" stroke="url(#snBlack)" stroke-width="2.5"/>
    <path d="M 10 12 L 10 8 Q 10 0 17.5 0 Q 25 0 25 8 L 25 12" fill="none" stroke="url(#snBlack)" stroke-width="2.5"/>
    <!-- Pink badge -->
    <circle cx="32" cy="8" r="9" fill="url(#snPink)"/>
    <text x="32" y="12" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  </g>
  <!-- User/wishlist -->
