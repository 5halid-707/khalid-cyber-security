<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="snBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f8f8"/>
    </linearGradient>
    <linearGradient id="snPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee296d"/>
      <stop offset="100%" stop-color="#d61f5c"/>
    </linearGradient>
    <linearGradient id="snPinkSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd6e3"/>
      <stop offset="100%" stop-color="#ffb3cf"/>
    </linearGradient>
    <linearGradient id="snBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="snProduct1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0f5"/>
      <stop offset="100%" stop-color="#ffe0ec"/>
    </linearGradient>
    <linearGradient id="snProduct2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="snProduct3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#ffefb8"/>
    </linearGradient>
    <linearGradient id="snProduct4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#cce4ff"/>
    </linearGradient>
    <linearGradient id="snProduct5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8ff"/>
      <stop offset="100%" stop-color="#d8c4ff"/>
    </linearGradient>
    <filter id="snShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="snPinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#snBg)"/>

  <!-- Top header (SHEIN black) -->
  <rect x="0" y="0" width="1200" height="75" fill="#ffffff"/>
  <line x1="0" y1="75" width="1200" height="1" stroke="#eeeeee" stroke-width="1"/>

  <!-- SHEIN bold black logo -->
  <text x="40" y="55" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="900" fill="url(#snBlack)" letter-spacing="0">SHEIN</text>

  <!-- Pink accent dot -->
  <circle cx="195" cy="48" r="6" fill="url(#snPink)"/>

  <!-- Search bar -->
  <g transform="translate(290, 22)" filter="url(#snShadow)">
    <rect width="650" height="40" rx="20" fill="#f5f5f5"/>
    <rect width="650" height="40" rx="20" fill="none" stroke="#ee296d" stroke-width="1.5"/>
    <circle cx="22" cy="20" r="9" fill="none" stroke="#888" stroke-width="2"/>
    <line x1="29" y1="27" x2="36" y2="34" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <text x="50" y="26" font-family="Arial, sans-serif" font-size="14" fill="#999999">dresses, tops, shoes...</text>
    <!-- Pink camera icon -->
    <g transform="translate(610, 8)">
      <rect x="0" y="0" width="24" height="20" rx="3" fill="url(#snPink)"/>
      <rect x="6" y="-4" width="12" height="6" rx="1" fill="url(#snPink)"/>
      <circle cx="12" cy="10" r="5" fill="#ffffff"/>
      <circle cx="12" cy="10" r="3" fill="url(#snPink)"/>
    </g>
  </g>

  <!-- Top right icons -->
  <!-- Shopping bag -->
