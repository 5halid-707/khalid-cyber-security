    <path d="M 10 22 C 10 22 0 15 0 9 C 0 5 4 3 7 6 L 10 9 L 13 6 C 16 3 20 5 20 9 C 20 15 10 22 10 22 Z" fill="url(#snPink)"/>
  </g>
  <g transform="translate(1130, 18)">
    <circle cx="18" cy="18" r="18" fill="#f5f5f5"/>
    <circle cx="18" cy="14" r="6" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M 6 32 Q 6 22 18 22 Q 30 22 30 32" fill="none" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Pink promo banner -->
  <g filter="url(#snShadow)">
    <rect x="0" y="75" width="1200" height="55" fill="url(#snPink)"/>
    <text x="40" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">⚡ FLASH SALE • UP TO 80% OFF</text>
    <text x="600" y="110" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">⏰ Ends in 02:14:33</text>
    <text x="1160" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="end">SHOP NOW →</text>
  </g>

  <!-- Category pills -->
