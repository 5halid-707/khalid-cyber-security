      <text x="12" y="225" font-family="Arial, sans-serif" font-size="11" fill="#999">SHEIN</text>
      <text x="12" y="245" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#000">Casual Button Shirt</text>
      <text x="12" y="270" font-family="Arial, sans-serif" font-size="11" fill="#999">★★★★☆ <tspan fill="#ee296d">(892)</tspan></text>
      <text x="12" y="298" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000">$12.49</text>
      <text x="75" y="298" font-family="Arial, sans-serif" font-size="12" fill="#999" text-decoration="line-through">$20.99</text>
      <text x="12" y="315" font-family="Arial, sans-serif" font-size="10" fill="#ee296d" font-weight="bold">⚡ Almost sold out</text>
    </g>

    <!-- Product 3: Shoes -->
    <g transform="translate(470, 250)">
      <rect width="200" height="320" rx="8" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="200" rx="8" fill="url(#snProduct3)"/>
      <!-- Shoes silhouette -->
