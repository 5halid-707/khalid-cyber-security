<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="amzBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaeded"/>
    </linearGradient>
    <linearGradient id="amzOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#e88a00"/>
    </linearGradient>
    <linearGradient id="amzProduct1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f3f3"/>
      <stop offset="100%" stop-color="#d9d9d9"/>
    </linearGradient>
    <linearGradient id="amzProduct2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <filter id="amzShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#amzBg)"/>

  <!-- Top header (dark blue) -->
  <rect x="0" y="0" width="1200" height="70" fill="#131921"/>
  <rect x="0" y="70" width="1200" height="40" fill="#232f3e"/>

  <!-- Amazon logo (orange smile) -->
  <text x="40" y="48" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff">amazon</text>
  <!-- Smile arrow under logo -->
  <path d="M 40 55 Q 120 75 200 55" stroke="#ff9900" stroke-width="4" fill="none" stroke-linecap="round"/>
  <polygon points="195,48 210,55 198,62" fill="#ff9900"/>

  <!-- Search bar -->
  <rect x="280" y="20" width="650" height="40" rx="4" fill="#ffffff"/>
  <rect x="280" y="20" width="60" height="40" rx="4" fill="#e6e6e6"/>
  <text x="310" y="45" font-family="Arial, sans-serif" font-size="14" fill="#555555">All</text>
  <polygon points="320,32 328,38 312,38" fill="#555555"/>
  <line x1="340" y1="25" x2="340" y2="55" stroke="#cccccc" stroke-width="1"/>
  <text x="355" y="45" font-family="Arial, sans-serif" font-size="14" fill="#888888">Search Amazon</text>
  <rect x="895" y="20" width="35" height="40" fill="#febd69"/>
  <circle cx="912" cy="38" r="8" fill="none" stroke="#131921" stroke-width="2"/>
  <line x1="918" y1="44" x2="924" y2="50" stroke="#131921" stroke-width="2" stroke-linecap="round"/>

  <!-- Nav items -->
  <text x="40" y="95" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">☰ All</text>
  <text x="100" y="95" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Today's Deals</text>
  <text x="230" y="95" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Customer Service</text>
  <text x="395" y="95" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Registry</text>
  <text x="465" y="95" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Gift Cards</text>
  <text x="555" y="95" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Sell</text>

  <!-- Cart icon top right -->
  <g transform="translate(1100, 22)">
    <path d="M 0 10 L 0 40 L 35 40 L 42 14 L 5 14 Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
    <ellipse cx="11" cy="48" rx="4" ry="4" fill="#ffffff"/>
    <ellipse cx="33" cy="48" rx="4" ry="4" fill="#ffffff"/>
    <text x="25" y="14" font-family="Arial, sans-serif" font-size="14" fill="#ff9900" font-weight="bold" text-anchor="middle">3</text>
  </g>
  <text x="1130" y="48" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Cart</text>

  <!-- Banner -->
  <g filter="url(#amzShadow)">
    <rect x="40" y="130" width="1120" height="120" rx="6" fill="#232f3e"/>
    <rect x="40" y="130" width="1120" height="120" rx="6" fill="url(#amzOrange)" opacity="0.15"/>
    <text x="80" y="180" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#ffffff">Up to 70% Off Electronics</text>
    <text x="80" y="220" font-family="Arial, sans-serif" font-size="18" fill="#ff9900">Shop today's best deals on top brands →</text>
    <g transform="translate(960, 160)">
      <rect x="0" y="0" width="160" height="50" rx="25" fill="url(#amzOrange)"/>
      <text x="80" y="33" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#131921" text-anchor="middle">Shop Now</text>
    </g>
  </g>

  <!-- Section title -->
  <text x="40" y="290" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0f1111">Recommended for you</text>

  <!-- Product grid 4 cards -->
  <g filter="url(#amzShadow)">
    <!-- Product 1: Headphones -->
    <g transform="translate(40, 310)">
      <rect width="270" height="320" rx="6" fill="#ffffff" stroke="#e7e7e7" stroke-width="1"/>
      <rect x="20" y="20" width="230" height="170" rx="4" fill="url(#amzProduct1)"/>
      <!-- Headphones icon -->
      <g transform="translate(95, 70)">
        <path d="M 10 60 Q 10 10 60 10 Q 110 10 110 60" stroke="#131921" stroke-width="6" fill="none" stroke-linecap="round"/>
        <rect x="0" y="50" width="22" height="40" rx="6" fill="#ff9900"/>
        <rect x="98" y="50" width="22" height="40" rx="6" fill="#ff9900"/>
      </g>
      <text x="20" y="220" font-family="Arial, sans-serif" font-size="14" fill="#007185">Wireless Headphones</text>
      <text x="20" y="248" font-family="Arial, sans-serif" font-size="13" fill="#0f1111">★★★★★ <tspan fill="#007185">1,234</tspan></text>
      <text x="20" y="285" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0f1111">$79<tspan font-size="14">.99</tspan></text>
      <text x="110" y="285" font-family="Arial, sans-serif" font-size="13" fill="#888888" text-decoration="line-through">$129.99</text>
      <text x="20" y="305" font-family="Arial, sans-serif" font-size="12" fill="#007600" font-weight="bold">In Stock</text>
    </g>

    <!-- Product 2: Watch -->
    <g transform="translate(330, 310)">
      <rect width="270" height="320" rx="6" fill="#ffffff" stroke="#e7e7e7" stroke-width="1"/>
      <rect x="20" y="20" width="230" height="170" rx="4" fill="url(#amzProduct2)"/>
      <!-- Watch icon -->
      <g transform="translate(105, 65)">
        <rect x="0" y="20" width="60" height="60" rx="14" fill="#131921" stroke="#ff9900" stroke-width="3"/>
        <rect x="-8" y="30" width="8" height="40" rx="2" fill="#131921"/>
        <rect x="60" y="30" width="8" height="40" rx="2" fill="#131921"/>
        <circle cx="30" cy="50" r="14" fill="#ff9900"/>
        <line x1="30" y1="50" x2="30" y2="40" stroke="#131921" stroke-width="2"/>
        <line x1="30" y1="50" x2="38" y2="50" stroke="#131921" stroke-width="2"/>
      </g>
      <text x="20" y="220" font-family="Arial, sans-serif" font-size="14" fill="#007185">Smart Watch Pro</text>
      <text x="20" y="248" font-family="Arial, sans-serif" font-size="13" fill="#0f1111">★★★★☆ <tspan fill="#007185">856</tspan></text>
      <text x="20" y="285" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0f1111">$199<tspan font-size="14">.00</tspan></text>
      <text x="20" y="305" font-family="Arial, sans-serif" font-size="12" fill="#007600" font-weight="bold">Prime ✓ FREE Delivery</text>
    </g>

    <!-- Product 3: Camera -->
    <g transform="translate(620, 310)">
      <rect width="270" height="320" rx="6" fill="#ffffff" stroke="#e7e7e7" stroke-width="1"/>
      <rect x="20" y="20" width="230" height="170" rx="4" fill="url(#amzProduct1)"/>
      <!-- Camera icon -->
      <g transform="translate(95, 75)">
        <rect x="0" y="0" width="80" height="55" rx="6" fill="#131921"/>
        <rect x="25" y="-10" width="30" height="15" rx="2" fill="#131921"/>
        <circle cx="40" cy="28" r="18" fill="#ff9900"/>
        <circle cx="40" cy="28" r="10" fill="#131921"/>
        <circle cx="46" cy="22" r="3" fill="#ffffff" opacity="0.7"/>
        <rect x="62" y="8" width="10" height="6" rx="1" fill="#ff9900"/>
      </g>
      <text x="20" y="220" font-family="Arial, sans-serif" font-size="14" fill="#007185">4K Digital Camera</text>
      <text x="20" y="248" font-family="Arial, sans-serif" font-size="13" fill="#0f1111">★★★★★ <tspan fill="#007185">2,041</tspan></text>
      <text x="20" y="285" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0f1111">$449<tspan font-size="14">.99</tspan></text>
      <text x="20" y="305" font-family="Arial, sans-serif" font-size="12" fill="#007600" font-weight="bold">Only 3 left</text>
    </g>

    <!-- Product 4: Speaker -->
    <g transform="translate(910, 310)">
      <rect width="250" height="320" rx="6" fill="#ffffff" stroke="#e7e7e7" stroke-width="1"/>
      <rect x="20" y="20" width="210" height="170" rx="4" fill="url(#amzProduct2)"/>
      <!-- Speaker icon -->
      <g transform="translate(100, 60)">
        <rect x="0" y="0" width="50" height="100" rx="8" fill="#131921"/>
        <circle cx="25" cy="30" r="12" fill="#ff9900"/>
        <circle cx="25" cy="30" r="6" fill="#131921"/>
        <circle cx="25" cy="70" r="15" fill="#444"/>
        <circle cx="25" cy="70" r="8" fill="#222"/>
      </g>
      <text x="20" y="220" font-family="Arial, sans-serif" font-size="14" fill="#007185">Bluetooth Speaker</text>
      <text x="20" y="248" font-family="Arial, sans-serif" font-size="13" fill="#0f1111">★★★★☆ <tspan fill="#007185">567</tspan></text>
      <text x="20" y="285" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0f1111">$59<tspan font-size="14">.99</tspan></text>
      <text x="20" y="305" font-family="Arial, sans-serif" font-size="12" fill="#007600" font-weight="bold">In Stock</text>
    </g>
  </g>

  <!-- Bottom -->
  <rect x="0" y="650" width="1200" height="25" fill="#232f3e"/>
  <text x="600" y="668" font-family="Arial, sans-serif" font-size="12" fill="#dddddd" text-anchor="middle">© 1996-2024, Amazon Clone Project, Inc. or its affiliates</text>
</svg>
