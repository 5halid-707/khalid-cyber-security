<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="nfRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#b20710"/>
    </linearGradient>
    <linearGradient id="nfPoster1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b3d"/>
      <stop offset="100%" stop-color="#6b2c5e"/>
    </linearGradient>
    <linearGradient id="nfPoster2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d4d6b"/>
    </linearGradient>
    <linearGradient id="nfPoster3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c1f1f"/>
      <stop offset="100%" stop-color="#8b2c2c"/>
    </linearGradient>
    <linearGradient id="nfPoster4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d4a2d"/>
      <stop offset="100%" stop-color="#1a5e1a"/>
    </linearGradient>
    <filter id="nfShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nfGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#nfBg)"/>

  <!-- Top nav bar -->
  <rect x="0" y="0" width="1200" height="70" fill="#141414" opacity="0.95"/>
  <text x="40" y="48" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="url(#nfRed)" letter-spacing="-2">NETFLIX</text>
  <text x="220" y="44" font-family="Arial, sans-serif" font-size="16" fill="#e5e5e5">Home</text>
  <text x="290" y="44" font-family="Arial, sans-serif" font-size="16" fill="#e5e5e5">TV Shows</text>
  <text x="395" y="44" font-family="Arial, sans-serif" font-size="16" fill="#e5e5e5">Movies</text>
  <text x="475" y="44" font-family="Arial, sans-serif" font-size="16" fill="#e5e5e5">New &amp; Popular</text>
  <circle cx="1140" cy="35" r="16" fill="#e50914" opacity="0.8"/>
  <text x="1134" y="41" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">K</text>

  <!-- Big "N" logo watermark -->
  <g transform="translate(60, 130)" opacity="0.12">
    <path d="M 0 0 L 0 320 L 50 320 L 50 90 L 200 320 L 240 320 L 240 0 L 190 0 L 190 230 L 40 0 Z" fill="#e50914"/>
  </g>

  <!-- Featured hero banner -->
  <g filter="url(#nfShadow)">
    <rect x="60" y="110" width="1080" height="240" rx="8" fill="url(#nfPoster2)"/>
    <rect x="60" y="110" width="1080" height="240" rx="8" fill="url(#nfBg)" opacity="0.25"/>
    <text x="90" y="180" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" fill="#ffffff">NETFLIX ORIGINAL</text>
    <text x="90" y="240" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">Stranger Things</text>
    <text x="90" y="280" font-family="Arial, sans-serif" font-size="18" fill="#b3b3b3">When a young boy vanishes, a small town uncovers a mystery involving secret experiments, terrifying supernatural forces and one strange little girl.</text>
    <!-- Play button -->
    <g transform="translate(90, 300)">
      <rect x="0" y="0" width="140" height="40" rx="4" fill="#e50914" filter="url(#nfGlow)"/>
      <polygon points="20,10 20,30 38,20" fill="#ffffff"/>
      <text x="55" y="26" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Play</text>
    </g>
    <g transform="translate(245, 300)">
      <rect x="0" y="0" width="160" height="40" rx="4" fill="#6b6b6b" opacity="0.85"/>
      <circle cx="22" cy="20" r="9" fill="none" stroke="#fff" stroke-width="2"/>
      <polygon points="18,16 18,24 26,20" fill="#fff"/>
      <text x="45" y="26" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">More Info</text>
    </g>
  </g>

  <!-- Trending row label -->
  <text x="60" y="400" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e5e5e5">Trending Now</text>

  <!-- Movie poster grid -->
  <g filter="url(#nfShadow)">
    <!-- Poster 1 -->
    <g transform="translate(60, 420)">
      <rect width="200" height="120" rx="4" fill="url(#nfPoster1)"/>
      <rect width="200" height="120" rx="4" fill="url(#nfBg)" opacity="0.2"/>
      <text x="15" y="35" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#e50914" opacity="0.85">N</text>
      <text x="15" y="105" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Mystery Series</text>
    </g>
    <!-- Poster 2 -->
    <g transform="translate(280, 420)">
      <rect width="200" height="120" rx="4" fill="url(#nfPoster2)"/>
      <rect width="200" height="120" rx="4" fill="url(#nfBg)" opacity="0.2"/>
      <text x="15" y="35" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#e50914" opacity="0.85">N</text>
      <text x="15" y="105" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Sci-Fi Thriller</text>
    </g>
    <!-- Poster 3 -->
    <g transform="translate(500, 420)">
      <rect width="200" height="120" rx="4" fill="url(#nfPoster3)"/>
      <rect width="200" height="120" rx="4" fill="url(#nfBg)" opacity="0.2"/>
      <text x="15" y="35" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#e50914" opacity="0.85">N</text>
      <text x="15" y="105" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Action Movie</text>
    </g>
    <!-- Poster 4 -->
    <g transform="translate(720, 420)">
      <rect width="200" height="120" rx="4" fill="url(#nfPoster4)"/>
      <rect width="200" height="120" rx="4" fill="url(#nfBg)" opacity="0.2"/>
      <text x="15" y="35" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#e50914" opacity="0.85">N</text>
      <text x="15" y="105" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Nature Doc</text>
    </g>
    <!-- Poster 5 with play overlay -->
    <g transform="translate(940, 420)">
      <rect width="200" height="120" rx="4" fill="url(#nfPoster1)"/>
      <rect width="200" height="120" rx="4" fill="#000000" opacity="0.5"/>
      <circle cx="100" cy="60" r="28" fill="#ffffff" opacity="0.95"/>
      <polygon points="92,46 92,74 116,60" fill="#e50914"/>
      <text x="15" y="105" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Now Playing</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <text x="60" y="640" font-family="Arial, sans-serif" font-size="14" fill="#737373">Clone Project • Built with React &amp; TMDB API</text>
  <text x="1140" y="640" font-family="Arial, sans-serif" font-size="14" fill="#737373" text-anchor="end">4K Ultra HD</text>
</svg>
