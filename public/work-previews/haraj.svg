<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hjBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="hjCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="hjGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="hjShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hjTextShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="675" fill="url(#hjBg)"/>

  <!-- Decorative Arabic pattern overlay -->
  <g opacity="0.06" fill="#ffffff">
    <g transform="translate(50, 50)">
      <circle cx="0" cy="0" r="30"/>
      <circle cx="100" cy="0" r="30"/>
      <circle cx="50" cy="80" r="30"/>
    </g>
    <g transform="translate(950, 500)">
      <circle cx="0" cy="0" r="40"/>
      <circle cx="120" cy="0" r="40"/>
      <circle cx="60" cy="100" r="40"/>
    </g>
  </g>

  <!-- Top header -->
  <rect x="0" y="0" width="1200" height="80" fill="#c2410c"/>
  <rect x="0" y="0" width="1200" height="80" fill="#000000" opacity="0.15"/>

  <!-- حراج logo large top-left -->
  <text x="40" y="58" font-family="'Arabic Typesetting', 'Traditional Arabic', 'Scheherazade', serif" font-size="48" font-weight="bold" fill="#ffffff" direction="rtl" filter="url(#hjTextShadow)">حراج</text>
  <text x="180" y="50" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.9">SAUDI CLASSIFIEDS</text>
  <text x="180" y="68" font-family="Arial, sans-serif" font-size="11" fill="#fed7aa">السوق المفتوح</text>

  <!-- Search bar -->
  <g transform="translate(400, 22)" filter="url(#hjShadow)">
    <rect width="600" height="40" rx="20" fill="#ffffff"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">ابحث عن سيارة، عقار، جوال...</text>
    <rect x="540" y="0" width="60" height="40" rx="20" fill="url(#hjGold)"/>
    <circle cx="570" cy="20" r="9" fill="none" stroke="#ffffff" stroke-width="2"/>
    <line x1="577" y1="27" x2="584" y2="34" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Header right icons -->
  <g transform="translate(1050, 25)">
    <!-- User icon -->
    <circle cx="20" cy="20" r="18" fill="#ffffff" opacity="0.2"/>
    <circle cx="20" cy="15" r="5" fill="#ffffff"/>
    <path d="M 8 32 Q 8 22 20 22 Q 32 22 32 32" stroke="#ffffff" stroke-width="2.5" fill="#ffffff"/>
  </g>
  <g transform="translate(1110, 25)">
    <!-- Heart icon -->
    <circle cx="20" cy="20" r="18" fill="#ffffff" opacity="0.2"/>
    <path d="M 20 30 C 20 30 10 23 10 16 C 10 12 14 10 17 13 L 20 16 L 23 13 C 26 10 30 12 30 16 C 30 23 20 30 20 30 Z" fill="#ffffff"/>
  </g>

  <!-- Saudi flag accent (left) -->
  <g transform="translate(40, 110)">
    <rect width="60" height="40" fill="#006c35"/>
    <text x="30" y="26" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">السعودية</text>
    <!-- Sword -->
    <line x1="10" y1="32" x2="50" y2="32" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- Category chips row -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#9a3412">
    <g transform="translate(120, 110)" filter="url(#hjShadow)">
      <rect width="100" height="40" rx="20" fill="#ffffff"/>
      <text x="50" y="26" text-anchor="middle" font-weight="bold">🚗 سيارات</text>
    </g>
    <g transform="translate(230, 110)" filter="url(#hjShadow)">
      <rect width="100" height="40" rx="20" fill="#ffffff"/>
      <text x="50" y="26" text-anchor="middle" font-weight="bold">🏠 عقارات</text>
    </g>
    <g transform="translate(340, 110)" filter="url(#hjShadow)">
      <rect width="100" height="40" rx="20" fill="#ffffff"/>
      <text x="50" y="26" text-anchor="middle" font-weight="bold">📱 جوالات</text>
    </g>
    <g transform="translate(450, 110)" filter="url(#hjShadow)">
      <rect width="100" height="40" rx="20" fill="#ffffff"/>
      <text x="50" y="26" text-anchor="middle" font-weight="bold">🛋️ أثاث</text>
    </g>
    <g transform="translate(560, 110)" filter="url(#hjShadow)">
      <rect width="100" height="40" rx="20" fill="#ffffff"/>
      <text x="50" y="26" text-anchor="middle" font-weight="bold">💼 وظائف</text>
    </g>
  </g>

  <!-- Section title -->
  <text x="40" y="200" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" direction="rtl">أحدث الإعلانات</text>
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="14" fill="#fed7aa">Latest Listings</text>

  <!-- Classified Ad Cards (3 columns) -->
  <!-- Card 1: Car -->
  <g transform="translate(40, 220)" filter="url(#hjShadow)">
    <rect width="360" height="380" rx="12" fill="url(#hjCard)"/>
    <!-- Image area -->
    <rect x="0" y="0" width="360" height="200" rx="12" fill="#1e293b"/>
    <rect x="0" y="180" width="360" height="20" fill="url(#hjCard)"/>
    <!-- Car icon -->
    <g transform="translate(80, 50)">
      <!-- Car body -->
      <path d="M 30 80 L 50 40 L 150 40 L 180 80 L 200 80 L 200 100 L 0 100 L 0 80 Z" fill="#dc2626"/>
      <!-- Windows -->
      <path d="M 60 45 L 70 45 L 80 75 L 55 75 Z" fill="#bfdbfe"/>
      <path d="M 90 45 L 140 45 L 145 75 L 95 75 Z" fill="#bfdbfe"/>
      <!-- Wheels -->
      <circle cx="50" cy="100" r="18" fill="#1f2937"/>
      <circle cx="50" cy="100" r="8" fill="#9ca3af"/>
      <circle cx="150" cy="100" r="18" fill="#1f2937"/>
      <circle cx="150" cy="100" r="8" fill="#9ca3af"/>
    </g>
    <!-- Badge -->
    <g transform="translate(15, 15)">
      <rect width="80" height="24" rx="4" fill="#dc2626"/>
      <text x="40" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">مميز ★</text>
    </g>
    <!-- Title -->
    <text x="20" y="235" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937" direction="rtl">تويوتا كامري 2023</text>
    <text x="20" y="258" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Toyota Camry 2023 • فل كامل</text>
    <!-- Specs row -->
    <g transform="translate(20, 275)" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
      <text x="0" y="14">⛽ بنزين</text>
      <text x="80" y="14">🛣️ 15,000 كم</text>
      <text x="200" y="14">📅 2023</text>
    </g>
    <!-- Location -->
    <text x="20" y="320" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af">📍 الرياض - حي العليا</text>
    <!-- Price -->
    <text x="20" y="358" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ea580c">85,000 <tspan font-size="16" fill="#6b7280">ريال</tspan></text>
    <!-- Time -->
    <text x="340" y="358" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="end">منذ ساعة</text>
  </g>

  <!-- Card 2: House -->
  <g transform="translate(420, 220)" filter="url(#hjShadow)">
    <rect width="360" height="380" rx="12" fill="url(#hjCard)"/>
    <rect x="0" y="0" width="360" height="200" rx="12" fill="#0f766e"/>
    <rect x="0" y="180" width="360" height="20" fill="url(#hjCard)"/>
    <!-- House icon -->
    <g transform="translate(100, 40)">
      <!-- Roof -->
      <path d="M 0 70 L 80 20 L 160 70 L 160 80 L 0 80 Z" fill="#dc2626"/>
      <!-- House body -->
      <rect x="20" y="80" width="120" height="80" fill="#fef3c7"/>
      <!-- Door -->
      <rect x="60" y="110" width="30" height="50" fill="#92400e"/>
      <circle cx="84" cy="135" r="2" fill="#fbbf24"/>
      <!-- Windows -->
      <rect x="30" y="95" width="20" height="20" fill="#bfdbfe" stroke="#92400e" stroke-width="1"/>
      <rect x="100" y="95" width="20" height="20" fill="#bfdbfe" stroke="#92400e" stroke-width="1"/>
      <!-- Chimney -->
      <rect x="120" y="40" width="15" height="25" fill="#7c2d12"/>
    </g>
    <g transform="translate(15, 15)">
      <rect width="90" height="24" rx="4" fill="#16a34a"/>
      <text x="45" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">للبيع ✓</text>
    </g>
    <text x="20" y="235" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937" direction="rtl">فيلا دورين فاخرة</text>
    <text x="20" y="258" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Luxury Villa • 450 م²</text>
    <g transform="translate(20, 275)" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
      <text x="0" y="14">🛏️ 5 غرف</text>
      <text x="100" y="14">🚿 4 حمامات</text>
      <text x="220" y="14">🚗 جراج</text>
    </g>
    <text x="20" y="320" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af">📍 جدة - حي الشاطئ</text>
    <text x="20" y="358" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ea580c">2,500,000 <tspan font-size="16" fill="#6b7280">ريال</tspan></text>
    <text x="340" y="358" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="end">منذ 3 ساعات</text>
  </g>

  <!-- Card 3: Phone -->
  <g transform="translate(800, 220)" filter="url(#hjShadow)">
    <rect width="360" height="380" rx="12" fill="url(#hjCard)"/>
    <rect x="0" y="0" width="360" height="200" rx="12" fill="#1e1b4b"/>
    <rect x="0" y="180" width="360" height="20" fill="url(#hjCard)"/>
    <!-- Phone icon -->
    <g transform="translate(135, 30)">
      <rect x="0" y="0" width="90" height="160" rx="14" fill="#0f172a" stroke="#475569" stroke-width="2"/>
      <rect x="6" y="14" width="78" height="130" rx="4" fill="#1e293b"/>
      <!-- Camera bump -->
      <rect x="10" y="20" width="30" height="30" rx="6" fill="#0f172a"/>
      <circle cx="20" cy="30" r="6" fill="#374151"/>
      <circle cx="32" cy="30" r="6" fill="#374151"/>
      <circle cx="20" cy="42" r="3" fill="#fbbf24"/>
      <!-- Screen glow -->
      <rect x="6" y="60" width="78" height="80" rx="2" fill="url(#hjGold)" opacity="0.3"/>
      <!-- Apple-like logo -->
      <circle cx="45" cy="100" r="12" fill="#ffffff" opacity="0.15"/>
    </g>
    <g transform="translate(15, 15)">
      <rect width="80" height="24" rx="4" fill="#7c3aed"/>
      <text x="40" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">جديد ✨</text>
    </g>
    <text x="20" y="235" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937" direction="rtl">آيفون 15 برو ماكس</text>
    <text x="20" y="258" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">iPhone 15 Pro Max • 256GB</text>
    <g transform="translate(20, 275)" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
      <text x="0" y="14">💾 256 جيجا</text>
      <text x="100" y="14">📱 تيتانيوم</text>
      <text x="220" y="14">📦 ضمان</text>
    </g>
    <text x="20" y="320" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af">📍 الدمام - حي الفيصلية</text>
    <text x="20" y="358" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ea580c">5,200 <tspan font-size="16" fill="#6b7280">ريال</tspan></text>
    <text x="340" y="358" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="end">منذ يوم</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="625" width="1200" height="50" fill="#7c2d12"/>
  <text x="600" y="655" font-family="Arial, sans-serif" font-size="13" fill="#fed7aa" text-anchor="middle" direction="rtl">حراج • منصة الإعلانات المبوبة الأولى في السعودية</text>
</svg>
