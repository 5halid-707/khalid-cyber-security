<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ubBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="ubMapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="ubRoad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="ubAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <radialGradient id="ubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="ubShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ubCarGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#ubBg)"/>

  <!-- Map background -->
  <rect width="1200" height="675" fill="url(#ubMapBg)"/>

  <!-- Map grid lines (streets) -->
  <g stroke="#2a2a2a" stroke-width="3" fill="none">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="180" y1="0" x2="180" y2="675"/>
    <line x1="420" y1="0" x2="420" y2="675"/>
    <line x1="700" y1="0" x2="700" y2="675"/>
    <line x1="950" y1="0" x2="950" y2="675"/>
  </g>

  <!-- Major road -->
  <g>
    <rect x="0" y="345" width="1200" height="40" fill="url(#ubRoad)"/>
    <line x1="0" y1="365" x2="1200" y2="365" stroke="#ffffff" stroke-width="2" stroke-dasharray="20 20" opacity="0.5"/>
    <rect x="540" y="0" width="40" height="675" fill="url(#ubRoad)"/>
    <line x1="560" y1="0" x2="560" y2="675" stroke="#ffffff" stroke-width="2" stroke-dasharray="20 20" opacity="0.5"/>
  </g>

  <!-- Park/water areas -->
  <rect x="700" y="120" width="250" height="160" fill="#1a3a1a" opacity="0.5"/>
  <rect x="180" y="450" width="240" height="150" fill="#1a2a3a" opacity="0.5"/>

  <!-- Buildings blocks -->
  <g fill="#1f1f1f" stroke="#2a2a2a" stroke-width="1">
    <rect x="50" y="140" width="100" height="120"/>
    <rect x="200" y="140" width="200" height="120"/>
    <rect x="450" y="140" width="80" height="120"/>
    <rect x="640" y="140" width="50" height="120"/>
    <rect x="970" y="140" width="200" height="120"/>
    <rect x="50" y="290" width="100" height="40"/>
    <rect x="200" y="290" width="200" height="40"/>
    <rect x="640" y="290" width="50" height="40"/>
    <rect x="970" y="290" width="200" height="40"/>
    <rect x="50" y="400" width="100" height="40"/>
    <rect x="200" y="400" width="200" height="40"/>
    <rect x="450" y="400" width="80" height="40"/>
    <rect x="640" y="400" width="50" height="40"/>
    <rect x="700" y="400" width="240" height="40"/>
    <rect x="970" y="400" width="200" height="40"/>
    <rect x="50" y="470" width="100" height="120"/>
    <rect x="450" y="470" width="80" height="120"/>
    <rect x="640" y="470" width="50" height="120"/>
    <rect x="700" y="470" width="240" height="120"/>
    <rect x="970" y="470" width="200" height="120"/>
  </g>

  <!-- Route line (glowing white) -->
  <g filter="url(#ubCarGlow)">
    <path d="M 100 200 L 180 200 L 180 365 L 540 365 L 540 540 L 700 540 L 700 365 L 1000 365" stroke="#ffffff" stroke-width="6" fill="none" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>
    <path d="M 100 200 L 180 200 L 180 365 L 540 365 L 540 540 L 700 540 L 700 365 L 1000 365" stroke="#000000" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="8 8" opacity="0.4"/>
  </g>

  <!-- Pickup pin (start) -->
  <g transform="translate(100, 200)" filter="url(#ubShadow)">
    <circle cx="0" cy="0" r="14" fill="#ffffff" opacity="0.3"/>
    <circle cx="0" cy="0" r="9" fill="#000000" stroke="#ffffff" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
  </g>

  <!-- Destination pin (end) -->
  <g transform="translate(1000, 365)" filter="url(#ubShadow)">
    <path d="M 0 -30 C -16 -30 -25 -18 -25 -5 C -25 12 0 30 0 30 C 0 30 25 12 25 -5 C 25 -18 16 -30 0 -30 Z" fill="#ffffff"/>
    <circle cx="0" cy="-8" r="8" fill="#000000"/>
  </g>

  <!-- Car icon on map (center of route) -->
  <g transform="translate(540, 450)" filter="url(#ubCarGlow)">
    <circle cx="0" cy="0" r="36" fill="url(#ubGlow)"/>
    <circle cx="0" cy="0" r="26" fill="#ffffff"/>
    <!-- Car shape -->
    <g transform="translate(-20, -12)">
      <path d="M 5 18 L 8 8 L 32 8 L 35 18 L 40 18 L 40 24 L 0 24 L 0 18 Z" fill="#000000"/>
      <path d="M 10 10 L 14 10 L 16 16 L 9 16 Z" fill="#ffffff"/>
      <path d="M 18 10 L 28 10 L 30 16 L 18 16 Z" fill="#ffffff"/>
      <circle cx="10" cy="24" r="4" fill="#000000" stroke="#666" stroke-width="1"/>
      <circle cx="30" cy="24" r="4" fill="#000000" stroke="#666" stroke-width="1"/>
    </g>
  </g>

  <!-- Top header (Uber black bar) -->
  <rect x="0" y="0" width="1200" height="70" fill="#000000"/>
  <!-- Uber logo -->
  <text x="40" y="48" font-family="Uber Move, Arial, sans-serif" font-size="36" font-weight="900" fill="#ffffff" letter-spacing="-1">Uber</text>

  <!-- Top right user -->
  <g transform="translate(1100, 18)">
    <circle cx="20" cy="20" r="20" fill="#ffffff"/>
    <text x="20" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">K</text>
  </g>
  <text x="1060" y="42" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="end">Help</text>

  <!-- Bottom sheet (ride options) -->
  <g filter="url(#ubShadow)">
    <rect x="0" y="475" width="1200" height="200" fill="#ffffff"/>
    <!-- Drag handle -->
    <rect x="580" y="485" width="40" height="4" rx="2" fill="#cccccc"/>
  </g>

  <!-- "Get a ride" heading -->
  <text x="40" y="525" font-family="Uber Move, Arial, sans-serif" font-size="28" font-weight="bold" fill="#000000">Get a ride</text>

  <!-- Route info -->
  <g transform="translate(40, 555)">
    <!-- Pickup dot -->
    <circle cx="8" cy="10" r="6" fill="#000000"/>
    <line x1="8" y1="20" x2="8" y2="50" stroke="#cccccc" stroke-width="2" stroke-dasharray="3 3"/>
    <!-- Destination square -->
    <rect x="2" y="55" width="12" height="12" fill="#000000"/>
    <!-- Text -->
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#000000">King Fahd Road, Jeddah</text>
    <text x="30" y="65" font-family="Arial, sans-serif" font-size="16" fill="#000000">Ritz-Carlton Hotel</text>
  </g>

  <!-- Ride options -->
  <g transform="translate(450, 530)">
    <!-- UberX (selected) -->
    <g>
      <rect x="0" y="0" width="200" height="70" rx="6" fill="#000000"/>
      <text x="15" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">UberX</text>
      <text x="15" y="48" font-family="Arial, sans-serif" font-size="11" fill="#bbbbbb">Affordable rides, all to yourself</text>
      <text x="180" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="end">SAR 24</text>
      <!-- Car icon -->
      <g transform="translate(125, 18)" fill="#ffffff">
        <path d="M 5 18 L 8 8 L 32 8 L 35 18 L 40 18 L 40 24 L 0 24 L 0 18 Z"/>
        <circle cx="10" cy="24" r="3" fill="#000"/>
        <circle cx="30" cy="24" r="3" fill="#000"/>
      </g>
    </g>
    <!-- Comfort -->
    <g transform="translate(220, 0)">
      <rect x="0" y="0" width="200" height="70" rx="6" fill="#f6f6f6"/>
      <text x="15" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000000">Comfort</text>
      <text x="15" y="48" font-family="Arial, sans-serif" font-size="11" fill="#666666">Newer cars with extra legroom</text>
      <text x="180" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000000" text-anchor="end">SAR 38</text>
      <g transform="translate(125, 18)" fill="#000000">
        <path d="M 5 18 L 8 8 L 32 8 L 35 18 L 40 18 L 40 24 L 0 24 L 0 18 Z"/>
        <circle cx="10" cy="24" r="3" fill="#fff"/>
        <circle cx="30" cy="24" r="3" fill="#fff"/>
      </g>
    </g>
    <!-- Black -->
    <g transform="translate(440, 0)">
      <rect x="0" y="0" width="200" height="70" rx="6" fill="#f6f6f6"/>
      <text x="15" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000000">Black</text>
      <text x="15" y="48" font-family="Arial, sans-serif" font-size="11" fill="#666666">Premium rides in luxury cars</text>
      <text x="180" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000000" text-anchor="end">SAR 85</text>
      <g transform="translate(125, 18)" fill="#000000">
        <path d="M 5 18 L 8 8 L 32 8 L 35 18 L 40 18 L 40 24 L 0 24 L 0 18 Z"/>
        <circle cx="10" cy="24" r="3" fill="#fff"/>
        <circle cx="30" cy="24" r="3" fill="#fff"/>
      </g>
    </g>
  </g>

  <!-- Confirm button -->
  <g transform="translate(920, 610)">
    <rect width="240" height="50" rx="25" fill="#000000"/>
    <text x="120" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Confirm UberX</text>
  </g>
  <text x="940" y="630" font-family="Arial, sans-serif" font-size="11" fill="#666666">→ Choose payment</text>

  <!-- ETA badge near car -->
  <g transform="translate(540, 410)" filter="url(#ubShadow)">
    <rect x="-40" y="-15" width="80" height="24" rx="12" fill="#ffffff"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000000" text-anchor="middle">3 min away</text>
    <polygon points="-5,9 5,9 0,14" fill="#ffffff"/>
  </g>
</svg>
