<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="ciscoEthBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3a"/>
    </linearGradient>
    <linearGradient id="ciscoEthAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1ba0d7"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#ciscoEthBg)"/>

  <rect x="20" y="20" width="760" height="560" fill="none" stroke="url(#ciscoEthAccent)" stroke-width="3"/>
  <rect x="32" y="32" width="736" height="536" fill="none" stroke="#1ba0d7" stroke-width="1" stroke-opacity="0.4"/>

  <path d="M20 80 L20 20 L80 20" fill="none" stroke="#1ba0d7" stroke-width="4"/>
  <path d="M720 20 L780 20 L780 80" fill="none" stroke="#1ba0d7" stroke-width="4"/>
  <path d="M780 520 L780 580 L720 580" fill="none" stroke="#1ba0d7" stroke-width="4"/>
  <path d="M80 580 L20 580 L20 520" fill="none" stroke="#1ba0d7" stroke-width="4"/>

  <!-- Cisco logo - bridge pattern -->
  <g fill="#1ba0d7" transform="translate(360, 80)">
    <rect x="0" y="20" width="6" height="30"/>
    <rect x="10" y="10" width="6" height="40"/>
    <rect x="20" y="0" width="6" height="50"/>
    <rect x="30" y="15" width="6" height="35"/>
    <rect x="40" y="20" width="6" height="30"/>
    <rect x="50" y="5" width="6" height="45"/>
    <rect x="60" y="12" width="6" height="38"/>
    <rect x="70" y="20" width="6" height="30"/>
  </g>
  <text x="400" y="170" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1ba0d7" letter-spacing="2">CISCO</text>
  <text x="400" y="190" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1ba0d7" letter-spacing="2">NETWORKING ACADEMY</text>
  <line x1="280" y1="205" x2="520" y2="205" stroke="#1ba0d7" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Hacker hood icon -->
  <path d="M370 240 Q400 215 430 240 L430 285 Q400 295 370 285 Z" fill="none" stroke="#1ba0d7" stroke-width="2.5"/>
  <circle cx="386" cy="262" r="4" fill="#1ba0d7"/>
  <circle cx="414" cy="262" r="4" fill="#1ba0d7"/>
  <path d="M388 275 Q400 280 412 275" fill="none" stroke="#1ba0d7" stroke-width="2"/>

  <text x="400" y="335" text-anchor="middle" font-family="serif" font-size="20" fill="#9aa5b1">This badge is awarded to</text>

  <text x="400" y="375" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#ffffff">Eng. Khalid Mohammed Al-harbi</text>

  <text x="400" y="408" text-anchor="middle" font-family="serif" font-size="16" fill="#9aa5b1">for successfully completing</text>

  <text x="400" y="440" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#1ba0d7">Ethical Hacker Badge</text>
  <text x="400" y="463" text-anchor="middle" font-family="serif" font-size="13" fill="#9aa5b1">Penetration Testing • Vulnerability Assessment</text>

  <line x1="180" y1="510" x2="380" y2="510" stroke="#1ba0d7" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="420" y1="510" x2="620" y2="510" stroke="#1ba0d7" stroke-width="1" stroke-opacity="0.5"/>

  <text x="280" y="530" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9aa5b1">Date Issued</text>
  <text x="280" y="548" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff">August 05, 2025</text>

  <text x="520" y="530" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9aa5b1">Verified on</text>
  <text x="520" y="548" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1ba0d7">Credly</text>
</svg>
