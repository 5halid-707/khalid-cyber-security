<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="cpdBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f3a"/>
    </linearGradient>
    <linearGradient id="cpdAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <radialGradient id="cpdGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#cpdBg)"/>
  <rect width="800" height="600" fill="url(#cpdGlow)"/>

  <!-- Border -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="url(#cpdAccent)" stroke-width="3"/>
  <rect x="32" y="32" width="736" height="536" fill="none" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Corner decorations -->
  <path d="M20 80 L20 20 L80 20" fill="none" stroke="#00ffcc" stroke-width="4"/>
  <path d="M720 20 L780 20 L780 80" fill="none" stroke="#00ffcc" stroke-width="4"/>
  <path d="M780 520 L780 580 L720 580" fill="none" stroke="#00ffcc" stroke-width="4"/>
  <path d="M80 580 L20 580 L20 520" fill="none" stroke="#00ffcc" stroke-width="4"/>

  <!-- Top banner -->
  <text x="400" y="100" text-anchor="middle" font-family="serif" font-size="20" fill="#00ffcc" letter-spacing="4">CONTINUING PROFESSIONAL DEVELOPMENT</text>
  <line x1="200" y1="115" x2="600" y2="115" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.5"/>

  <!-- CPD Logo (star in circle) -->
  <circle cx="400" cy="190" r="48" fill="none" stroke="#00ffcc" stroke-width="3"/>
  <polygon points="400,158 410,182 436,182 415,198 423,222 400,208 377,222 385,198 364,182 390,182" fill="#00ffcc" stroke="#00ffcc" stroke-width="1"/>

  <text x="400" y="280" text-anchor="middle" font-family="serif" font-size="38" font-weight="bold" fill="#ffffff">CERTIFICATE</text>
  <text x="400" y="312" text-anchor="middle" font-family="serif" font-size="20" fill="#9aa5b1">OF PROFESSIONAL DEVELOPMENT</text>

  <text x="400" y="358" text-anchor="middle" font-family="serif" font-size="16" fill="#9aa5b1">This is to certify that</text>

  <text x="400" y="400" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#00ffcc">Eng. Khalid Mohammed Al-harbi</text>

  <text x="400" y="438" text-anchor="middle" font-family="serif" font-size="16" fill="#9aa5b1">has completed</text>

  <text x="400" y="472" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#ffffff">250 Hours of CPD Training</text>
  <text x="400" y="496" text-anchor="middle" font-family="serif" font-size="14" fill="#00a8e8">Cyber Security &amp; Network Protection</text>

  <!-- Footer line -->
  <line x1="180" y1="525" x2="380" y2="525" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="420" y1="525" x2="620" y2="525" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.5"/>

  <text x="280" y="548" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9aa5b1">Date of Issue</text>
  <text x="280" y="566" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff">2026</text>

  <text x="520" y="548" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9aa5b1">CPD Certification Service</text>
  <text x="520" y="566" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#00ffcc">United Kingdom</text>
</svg>
