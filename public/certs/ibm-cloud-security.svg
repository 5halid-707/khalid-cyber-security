  <path d="M340 240 Q340 215 365 215 Q375 195 400 195 Q425 195 435 215 Q460 215 460 240 Q470 250 470 265 Q470 285 450 285 L350 285 Q330 285 330 265 Q330 250 340 240 Z" fill="none" stroke="#1ba0d7" stroke-width="2.5"/>
