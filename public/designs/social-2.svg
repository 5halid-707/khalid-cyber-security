<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="story17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="neon17" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <linearGradient id="pink17" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>
    <linearGradient id="swipe17" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <filter id="glow17" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid17" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f1a26" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg17)"/>
  <rect width="400" height="300" fill="url(#grid17)"/>

  <!-- header -->
  <text x="200" y="22" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="9" fill="#4a6577" letter-spacing="3">IG / FB STORY · 1080×1920 · SWIPE UP</text>

  <!-- annotations left -->
  <g font-family="'Share Tech Mono', monospace" font-size="7" fill="#335566" letter-spacing="1">
    <text x="20" y="80">DIM</text>
    <text x="20" y="92">1080×1920</text>
    <text x="20" y="104">VERTICAL</text>
    <line x1="20" y1="112" x2="60" y2="112" stroke="#1a3a55"/>
    <text x="20" y="128">DURATION</text>
    <text x="20" y="140" fill="#ff00cc">15s</text>
    <line x1="20" y1="148" x2="60" y2="148" stroke="#1a3a55"/>
    <text x="20" y="164">CTA</text>
    <text x="20" y="176" fill="#00ffcc">SWIPE UP</text>
  </g>
  <!-- annotations right -->
  <g font-family="'Share Tech Mono', monospace" font-size="7" fill="#335566" letter-spacing="1">
    <text x="380" y="80" text-anchor="end">VIEWS</text>
    <text x="380" y="92" text-anchor="end" fill="#00ffcc">42.7K</text>
    <line x1="340" y1="100" x2="380" y2="100" stroke="#1a3a55"/>
    <text x="380" y="116" text-anchor="end">SWIPES</text>
    <text x="380" y="128" text-anchor="end" fill="#ff00cc">3,124</text>
    <line x1="340" y1="136" x2="380" y2="136" stroke="#1a3a55"/>
    <text x="380" y="152" text-anchor="end">CONVERSION</text>
    <text x="380" y="164" text-anchor="end" fill="#00a8e8">7.3%</text>
  </g>

  <!-- Story phone frame (vertical 9:16) -->
  <g transform="translate(155,35)">
    <!-- shadow -->
    <rect x="2" y="4" width="90" height="230" rx="14" fill="#000" opacity="0.5"/>
    <!-- phone body -->
    <rect width="90" height="230" rx="14" fill="#0a1018" stroke="#1a2433" stroke-width="1.5"/>
    <!-- screen -->
    <rect x="3" y="3" width="84" height="224" rx="11" fill="url(#story17)"/>
    <!-- neon frame glow -->
    <rect x="3" y="3" width="84" height="224" rx="11" fill="none" stroke="url(#pink17)" stroke-width="0.6" opacity="0.5" filter="url(#glow17)"/>

    <!-- story progress bar -->
    <g transform="translate(6,8)">
      <rect width="72" height="2" rx="1" fill="#1a2433"/>
      <rect width="50" height="2" rx="1" fill="url(#neon17)" filter="url(#glow17)"/>
    </g>

    <!-- top profile -->
    <g transform="translate(6,16)">
      <circle cx="4" cy="4" r="4" fill="none" stroke="url(#neon17)" stroke-width="0.8"/>
      <circle cx="4" cy="4" r="2" fill="#00ffcc"/>
      <text x="12" y="6" font-family="'Arial Black', sans-serif" font-size="5" font-weight="900" fill="#e6f0ff">kmh.studio</text>
      <text x="60" y="6" text-anchor="end" font-family="monospace" font-size="4" fill="#5a6a7a">2h</text>
      <circle cx="70" cy="4" r="1.5" fill="none" stroke="#5a6a7a" stroke-width="0.5"/>
    </g>

    <!-- background gradient blob -->
    <ellipse cx="45" cy="80" rx="50" ry="35" fill="url(#pink17)" opacity="0.12" filter="url(#glow17)"/>
    <ellipse cx="60" cy="100" rx="30" ry="25" fill="url(#neon17)" opacity="0.1" filter="url(#glow17)"/>

    <!-- Geometric decorative shapes -->
    <g opacity="0.5">
      <circle cx="20" cy="60" r="14" fill="none" stroke="url(#neon17)" stroke-width="0.6"/>
      <circle cx="70" cy="130" r="20" fill="none" stroke="url(#pink17)" stroke-width="0.6"/>
      <polygon points="45,40 50,50 40,50" fill="none" stroke="#00a8e8" stroke-width="0.6"/>
      <rect x="65" y="50" width="8" height="8" fill="none" stroke="#ff00cc" stroke-width="0.6" transform="rotate(45 69 54)"/>
    </g>

    <!-- Main content -->
    <g transform="translate(45,90)" text-anchor="middle">
      <text font-family="'Share Tech Mono', monospace" font-size="6" fill="#00ffcc" y="-12" letter-spacing="2">— NEW DROP —</text>
      <g filter="url(#glow17)">
        <text font-family="'Arial Black', sans-serif" font-size="16" font-weight="900" fill="url(#pink17)" y="6" letter-spacing="1">SUMMER</text>
      </g>
      <text font-family="'Arial Black', sans-serif" font-size="14" font-weight="900" fill="#ffffff" y="22" letter-spacing="2">COLLECTION</text>
      <text font-family="'Share Tech Mono', monospace" font-size="6" fill="#9aaabd" y="34" letter-spacing="1">Explore now</text>
    </g>

    <!-- product placeholder -->
    <g transform="translate(45,150)" filter="url(#glow17)">
      <ellipse rx="20" ry="10" fill="#0a1018" stroke="url(#neon17)" stroke-width="0.8"/>
      <path d="M -10 -2 Q -10 -15 0 -15 Q 10 -15 10 -2" fill="none" stroke="url(#neon17)" stroke-width="1.5"/>
      <rect x="-7" y="-2" width="14" height="8" rx="2" fill="none" stroke="url(#pink17)" stroke-width="0.8"/>
    </g>

    <!-- Swipe up CTA at bottom -->
    <g transform="translate(45,190)" text-anchor="middle">
      <!-- swipe up arrow animated look -->
      <g filter="url(#glow17)">
        <path d="M 0 -8 L -5 -3 M 0 -8 L 5 -3 M 0 -8 L 0 6" stroke="url(#swipe17)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </g>
      <text y="20" font-family="'Arial Black', sans-serif" font-size="7" font-weight="900" fill="url(#swipe17)" letter-spacing="1">SWIPE UP</text>
      <!-- pill button -->
      <rect x="-25" y="24" width="50" height="10" rx="5" fill="url(#neon17)" filter="url(#glow17)"/>
      <text y="31" font-family="'Arial Black', sans-serif" font-size="5" font-weight="900" fill="#05080f">SHOP NOW</text>
    </g>

    <!-- reply bar at bottom -->
    <g transform="translate(6,212)">
      <rect width="60" height="10" rx="5" fill="#05080f" stroke="#1a2433" stroke-width="0.5"/>
      <text x="30" y="7" text-anchor="middle" font-family="monospace" font-size="4" fill="#5a6a7a">Send message</text>
      <circle cx="68" cy="5" r="3" fill="none" stroke="#5a6a7a" stroke-width="0.6"/>
      <path d="M 66 5 L 67.5 6.5 L 71 3" stroke="#5a6a7a" stroke-width="0.5" fill="none"/>
    </g>
  </g>

  <text x="200" y="290" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#2a3543" letter-spacing="3">SOCIAL · STORY · SWIPE-UP CTA · VERTICAL</text>
</svg>
