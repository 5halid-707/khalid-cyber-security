<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="thumb18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="neon18" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <linearGradient id="pink18" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>
    <linearGradient id="play18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6f0ff"/>
    </linearGradient>
    <radialGradient id="thumbGlow18" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00cc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff00cc" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow18" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong18" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid18" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f1a26" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg18)"/>
  <rect width="400" height="300" fill="url(#grid18)"/>

  <!-- header -->
  <text x="200" y="22" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="9" fill="#4a6577" letter-spacing="3">YOUTUBE THUMBNAIL · 1280×720 · BOLD TYPOGRAPHY</text>

  <!-- Thumbnail container 16:9 -->
  <g transform="translate(40,40)">
    <!-- shadow -->
    <rect x="3" y="5" width="320" height="180" rx="8" fill="#000" opacity="0.5"/>
    <!-- body -->
    <rect width="320" height="180" rx="8" fill="url(#thumb18)" stroke="#1a2433" stroke-width="1.5"/>
    <!-- ambient glow -->
    <rect width="320" height="180" rx="8" fill="url(#thumbGlow18)"/>

    <!-- corner accents -->
    <g stroke="url(#pink18)" stroke-width="2" fill="none" filter="url(#glow18)">
      <path d="M 8 18 L 8 8 L 18 8"/>
      <path d="M 312 18 L 312 8 L 302 8"/>
      <path d="M 8 162 L 8 172 L 18 172"/>
      <path d="M 312 162 L 312 172 L 302 172"/>
    </g>

    <!-- top tag -->
    <g transform="translate(15,18)">
      <rect width="70" height="16" rx="3" fill="url(#pink18)" filter="url(#glow18)"/>
      <text x="35" y="11" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="7" font-weight="900" fill="#ffffff" letter-spacing="2">● LIVE NOW</text>
    </g>

    <!-- background grid pattern -->
    <g opacity="0.3">
      <line x1="0" y1="60" x2="320" y2="60" stroke="#1a3a55" stroke-width="0.4"/>
      <line x1="0" y1="120" x2="320" y2="120" stroke="#1a3a55" stroke-width="0.4"/>
      <line x1="80" y1="0" x2="80" y2="180" stroke="#1a3a55" stroke-width="0.4"/>
      <line x1="160" y1="0" x2="160" y2="180" stroke="#1a3a55" stroke-width="0.4"/>
      <line x1="240" y1="0" x2="240" y2="180" stroke="#1a3a55" stroke-width="0.4"/>
    </g>

    <!-- Decorative side elements -->
    <g opacity="0.6">
      <circle cx="280" cy="50" r="20" fill="none" stroke="url(#neon18)" stroke-width="0.8"/>
      <circle cx="280" cy="50" r="12" fill="none" stroke="url(#pink18)" stroke-width="0.6"/>
      <circle cx="280" cy="50" r="4" fill="#00ffcc" filter="url(#glow18)"/>
      <circle cx="40" cy="150" r="14" fill="none" stroke="url(#pink18)" stroke-width="0.6"/>
      <polygon points="50,40 56,50 44,50" fill="none" stroke="#00a8e8" stroke-width="0.8"/>
    </g>

    <!-- Main bold text -->
    <g transform="translate(160,75)" text-anchor="middle">
      <text font-family="'Share Tech Mono', monospace" font-size="10" fill="#00ffcc" y="-8" letter-spacing="3">— EPISODE 04 —</text>
      <g filter="url(#glow18)">
        <text font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="url(#pink18)" y="20" letter-spacing="2">CYBER</text>
      </g>
      <text font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#ffffff" y="50" letter-spacing="2">DESIGN</text>
      <text font-family="'Share Tech Mono', monospace" font-size="9" fill="#9aaabd" y="66" letter-spacing="2">— MASTERCLASS —</text>
    </g>

    <!-- Center play button -->
    <g transform="translate(160,148)" filter="url(#glowStrong18)">
      <circle r="22" fill="url(#pink18)" opacity="0.3"/>
      <circle r="16" fill="url(#pink18)"/>
      <circle r="16" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.5"/>
      <polygon points="-5,-8 -5,8 9,0" fill="url(#play18)"/>
    </g>

    <!-- Bottom host info bar -->
    <g transform="translate(0,160)">
      <rect width="320" height="20" fill="#05080f"/>
      <rect y="19" width="320" height="1" fill="url(#neon18)" opacity="0.5"/>
      <!-- avatar -->
      <circle cx="20" cy="10" r="6" fill="none" stroke="url(#neon18)" stroke-width="1"/>
      <circle cx="20" cy="8" r="2.5" fill="#00ffcc" opacity="0.6"/>
      <path d="M 14 14 Q 20 10 26 14" fill="#00ffcc" opacity="0.4"/>
      <text x="32" y="9" font-family="'Arial Black', sans-serif" font-size="7" font-weight="900" fill="#e6f0ff">KHALID AL-HARBI</text>
      <text x="32" y="16" font-family="monospace" font-size="5" fill="#5a6a7a">Cybersecurity Expert × Designer</text>
      <!-- right info -->
      <text x="305" y="9" text-anchor="end" font-family="monospace" font-size="6" fill="#9aaabd">42:18</text>
      <text x="305" y="16" text-anchor="end" font-family="monospace" font-size="5" fill="#5a6a7a">128K views · 8.4K likes</text>
    </g>

    <!-- duration badge -->
    <g transform="translate(280,135)">
      <rect width="32" height="14" rx="3" fill="#ff0066" filter="url(#glow18)"/>
      <text x="16" y="9" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="7" font-weight="900" fill="#ffffff">42:18</text>
    </g>
  </g>

  <!-- bottom annotations -->
  <g font-family="'Share Tech Mono', monospace" font-size="7" fill="#335566" letter-spacing="1">
    <text x="40" y="240">FORMAT</text>
    <text x="40" y="252" fill="#ff00cc">16:9 · MP4</text>
    <line x1="40" y1="258" x2="100" y2="258" stroke="#1a3a55"/>
    <text x="120" y="240">CTR</text>
    <text x="120" y="252" fill="#00ffcc">12.4%</text>
    <line x1="120" y1="258" x2="180" y2="258" stroke="#1a3a55"/>
    <text x="200" y="240">AVG VIEW</text>
    <text x="200" y="252" fill="#00a8e8">8m 42s</text>
    <line x1="200" y1="258" x2="270" y2="258" stroke="#1a3a55"/>
    <text x="290" y="240">RETENTION</text>
    <text x="290" y="252" fill="#ff00cc">68%</text>
  </g>

  <text x="200" y="285" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#2a3543" letter-spacing="3">YOUTUBE · THUMBNAIL · BOLD · PLAY BUTTON</text>
</svg>
