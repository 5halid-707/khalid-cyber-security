<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="blue4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00a8e8"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid4" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f1a26" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg4)"/>
  <rect width="400" height="300" fill="url(#grid4)"/>
  <!-- header bar -->
  <rect x="0" y="0" width="400" height="30" fill="#0a1018"/>
  <text x="20" y="20" font-family="'Share Tech Mono', monospace" font-size="10" fill="#4a6577" letter-spacing="2">BRAND GUIDELINES v1.0</text>
  <text x="380" y="20" text-anchor="end" font-family="'Share Tech Mono', monospace" font-size="10" fill="#4a6577" letter-spacing="2">KMH · STUDIO</text>

  <!-- LEFT: Logo placement -->
  <g transform="translate(20,50)">
    <rect width="160" height="110" rx="6" fill="#0a1018" stroke="#1a2433"/>
    <text x="10" y="15" font-family="'Share Tech Mono', monospace" font-size="8" fill="#335566" letter-spacing="2">LOGO · PRIMARY</text>
    <!-- placeholder logo -->
    <g transform="translate(80,65)" filter="url(#glow4)">
      <path d="M -18 -25 L -18 25 M -18 0 L 18 -25 M -18 0 L 18 25" stroke="url(#blue4)" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    <circle cx="80" cy="65" r="42" fill="none" stroke="#1a2433" stroke-dasharray="2 3"/>
    <!-- safe area -->
    <rect x="10" y="25" width="140" height="80" fill="none" stroke="#1a2433" stroke-dasharray="1 2"/>
  </g>
  <g transform="translate(20,170)">
    <rect width="75" height="50" rx="4" fill="#0a1018" stroke="#1a2433"/>
    <text x="6" y="12" font-family="'Share Tech Mono', monospace" font-size="7" fill="#335566">DARK</text>
    <g transform="translate(37,30)" opacity="0.7">
      <path d="M -8 -10 L -8 10 M -8 0 L 8 -10 M -8 0 L 8 10" stroke="#00ffcc" stroke-width="2" fill="none"/>
    </g>
  </g>
  <g transform="translate(105,170)">
    <rect width="75" height="50" rx="4" fill="#f5f7fa" stroke="#1a2433"/>
    <text x="6" y="12" font-family="'Share Tech Mono', monospace" font-size="7" fill="#335566">LIGHT</text>
    <g transform="translate(37,30)" opacity="0.85">
      <path d="M -8 -10 L -8 10 M -8 0 L 8 -10 M -8 0 L 8 10" stroke="#0a1018" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- RIGHT TOP: Color palette -->
  <g transform="translate(200,50)">
    <text x="0" y="10" font-family="'Share Tech Mono', monospace" font-size="8" fill="#335566" letter-spacing="2">COLOR · PALETTE</text>
    <!-- swatches -->
    <g transform="translate(0,18)">
      <rect width="55" height="40" rx="3" fill="#00ffcc"/>
      <text x="27" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a8a99">#00FFCC</text>
    </g>
    <g transform="translate(63,18)">
      <rect width="55" height="40" rx="3" fill="#00a8e8"/>
      <text x="27" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a8a99">#00A8E8</text>
    </g>
    <g transform="translate(126,18)">
      <rect width="55" height="40" rx="3" fill="#ff00cc"/>
      <text x="27" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a8a99">#FF00CC</text>
    </g>
    <g transform="translate(0,68)">
      <rect width="55" height="40" rx="3" fill="#05080f" stroke="#1a2433"/>
      <text x="27" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a8a99">#05080F</text>
    </g>
    <g transform="translate(63,68)">
      <rect width="55" height="40" rx="3" fill="#f5f7fa" stroke="#1a2433"/>
      <text x="27" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a8a99">#F5F7FA</text>
    </g>
    <g transform="translate(126,68)">
      <rect width="55" height="40" rx="3" fill="#1a2433"/>
      <text x="27" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a8a99">#1A2433</text>
    </g>
  </g>

  <!-- RIGHT BOTTOM: Typography -->
  <g transform="translate(200,180)">
    <text x="0" y="10" font-family="'Share Tech Mono', monospace" font-size="8" fill="#335566" letter-spacing="2">TYPOGRAPHY</text>
    <text x="0" y="35" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#e6f0ff" letter-spacing="1">Aa</text>
    <text x="35" y="30" font-family="sans-serif" font-size="10" fill="#7a8a99">HEADING</text>
    <text x="35" y="42" font-family="monospace" font-size="7" fill="#4a6577">Sans · 900</text>

    <text x="120" y="35" font-family="'Share Tech Mono', monospace" font-size="20" fill="#00ffcc">Aa</text>
    <text x="155" y="30" font-family="sans-serif" font-size="10" fill="#7a8a99">MONO</text>
    <text x="155" y="42" font-family="monospace" font-size="7" fill="#4a6577">Tech · 400</text>

    <line x1="0" y1="55" x2="180" y2="55" stroke="#1a2433"/>
    <text x="0" y="75" font-family="'Share Tech Mono', monospace" font-size="7" fill="#335566">HIERARCHY · 8PT SCALE</text>
    <g fill="#1a3a55">
      <rect x="0" y="82" width="60" height="5"/>
      <rect x="64" y="82" width="45" height="5"/>
      <rect x="113" y="82" width="32" height="5"/>
      <rect x="149" y="82" width="22" height="5"/>
      <rect x="175" y="82" width="14" height="5"/>
    </g>
  </g>

  <!-- footer -->
  <line x1="0" y1="285" x2="400" y2="285" stroke="#0f1a26"/>
  <text x="200" y="296" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#2a3543" letter-spacing="3">VISUAL IDENTITY SYSTEM</text>
</svg>
