<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="phone13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2433"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="screen13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="neon13" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <linearGradient id="pink13" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>
    <filter id="glow13" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid13" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f1a26" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg13)"/>
  <rect width="400" height="300" fill="url(#grid13)"/>
  <!-- ambient -->
  <ellipse cx="200" cy="150" rx="160" ry="100" fill="#00ffcc" opacity="0.05" filter="url(#glow13)"/>

  <!-- header -->
  <text x="200" y="22" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="9" fill="#4a6577" letter-spacing="3">MOBILE APP UI · DARK THEME · NEON</text>

  <!-- side annotations -->
  <g font-family="'Share Tech Mono', monospace" font-size="7" fill="#335566" letter-spacing="1">
    <text x="20" y="60">SCREEN</text>
    <text x="20" y="72">390 × 844</text>
    <line x1="20" y1="80" x2="60" y2="80" stroke="#1a3a55"/>
    <text x="20" y="100">@3x · iOS 17</text>
    <text x="380" y="60" text-anchor="end">DESIGN</text>
    <text x="380" y="72" text-anchor="end">FIGMA · 8PT</text>
    <line x1="340" y1="80" x2="380" y2="80" stroke="#1a3a55"/>
    <text x="380" y="100" text-anchor="end" fill="#00ffcc">DARK · v2.1</text>
  </g>

  <!-- Phone body -->
  <g transform="translate(140,45)">
    <!-- shadow -->
    <rect x="2" y="4" width="120" height="220" rx="18" fill="#000" opacity="0.5"/>
    <!-- body -->
    <rect width="120" height="220" rx="18" fill="url(#phone13)" stroke="#2a3543" stroke-width="1.5"/>
    <!-- inner screen -->
    <rect x="5" y="6" width="110" height="208" rx="14" fill="url(#screen13)"/>
    <!-- notch -->
    <rect x="42" y="6" width="36" height="14" rx="7" fill="#05080f"/>
    <circle cx="72" cy="13" r="2" fill="#1a2433"/>

    <!-- status bar -->
    <text x="14" y="18" font-family="monospace" font-size="6" fill="#7a8a99">9:41</text>
    <g fill="#7a8a99">
      <rect x="92" y="14" width="3" height="3"/>
      <rect x="96" y="13" width="3" height="4"/>
      <rect x="100" y="12" width="3" height="5"/>
      <rect x="104" y="16" width="2" height="1" fill="#00ffcc"/>
    </g>

    <!-- Header -->
    <g transform="translate(10,30)">
      <circle cx="6" cy="6" r="6" fill="none" stroke="url(#neon13)" stroke-width="1" filter="url(#glow13)"/>
      <circle cx="6" cy="6" r="2.5" fill="#00ffcc"/>
      <text x="18" y="9" font-family="'Arial Black', sans-serif" font-size="8" font-weight="900" fill="#e6f0ff">Dashboard</text>
      <g transform="translate(85,0)">
        <circle cx="3" cy="3" r="2" fill="none" stroke="#7a8a99" stroke-width="0.8"/>
        <circle cx="3" cy="3" r="0.8" fill="#7a8a99"/>
        <path d="M 3 5 L 3 8 M 1 7 L 3 9 L 5 7" stroke="#7a8a99" stroke-width="0.6" fill="none"/>
      </g>
    </g>

    <!-- Balance card -->
    <g transform="translate(10,48)">
      <rect width="100" height="48" rx="8" fill="#0a1018" stroke="#1a3a55"/>
      <rect x="0" y="0" width="100" height="2" rx="1" fill="url(#neon13)" filter="url(#glow13)"/>
      <text x="8" y="14" font-family="monospace" font-size="6" fill="#5a6a7a">TOTAL BALANCE</text>
      <text x="8" y="28" font-family="'Arial Black', sans-serif" font-size="14" font-weight="900" fill="#00ffcc" filter="url(#glow13)">SAR 12,480</text>
      <text x="8" y="40" font-family="monospace" font-size="5" fill="#00ffcc">▲ +12.4% this month</text>
      <!-- mini sparkline -->
      <polyline points="62,38 67,34 72,36 77,28 82,30 87,22 92,18" fill="none" stroke="url(#neon13)" stroke-width="1" filter="url(#glow13)"/>
    </g>

    <!-- Quick actions -->
    <g transform="translate(10,104)">
      <g>
        <rect width="22" height="22" rx="6" fill="#0a1018" stroke="#1a3a55"/>
        <path d="M 6 16 L 6 8 L 11 8 L 16 16 M 6 16 L 16 16 M 16 8 L 16 12" stroke="#00ffcc" stroke-width="1" fill="none"/>
        <text x="11" y="30" text-anchor="middle" font-family="monospace" font-size="5" fill="#5a6a7a">SEND</text>
      </g>
      <g transform="translate(26,0)">
        <rect width="22" height="22" rx="6" fill="#0a1018" stroke="#1a3a55"/>
        <path d="M 6 16 L 16 16 L 16 8 L 11 8 L 6 16 M 6 8 L 16 8 M 6 12 L 16 12" stroke="#00a8e8" stroke-width="1" fill="none"/>
        <text x="11" y="30" text-anchor="middle" font-family="monospace" font-size="5" fill="#5a6a7a">REQ</text>
      </g>
      <g transform="translate(52,0)">
        <rect width="22" height="22" rx="6" fill="#0a1018" stroke="#1a3a55"/>
        <path d="M 6 8 L 11 14 L 16 8" stroke="#ff00cc" stroke-width="1.2" fill="none"/>
        <rect x="10" y="14" width="2" height="3" fill="#ff00cc"/>
        <text x="11" y="30" text-anchor="middle" font-family="monospace" font-size="5" fill="#5a6a7a">SCAN</text>
      </g>
      <g transform="translate(78,0)">
        <rect width="22" height="22" rx="6" fill="#0a1018" stroke="#1a3a55"/>
        <circle cx="11" cy="11" r="4" fill="none" stroke="#00ffcc" stroke-width="1"/>
        <line x1="11" y1="7" x2="11" y2="15" stroke="#00ffcc" stroke-width="1"/>
        <line x1="7" y1="11" x2="15" y2="11" stroke="#00ffcc" stroke-width="1"/>
        <text x="11" y="30" text-anchor="middle" font-family="monospace" font-size="5" fill="#5a6a7a">MORE</text>
      </g>
    </g>

    <!-- Transaction list -->
    <g transform="translate(10,144)">
      <text x="0" y="0" font-family="monospace" font-size="6" fill="#7a8a99">RECENT</text>
      <text x="100" y="0" text-anchor="end" font-family="monospace" font-size="5" fill="#5a6a7a">SEE ALL</text>
      <!-- row 1 -->
      <g transform="translate(0,5)">
        <rect width="100" height="14" rx="4" fill="#0a1018"/>
        <circle cx="7" cy="7" r="4" fill="#00ffcc" opacity="0.2"/>
        <text x="7" y="9" text-anchor="middle" font-family="monospace" font-size="5" fill="#00ffcc">N</text>
        <text x="15" y="9" font-family="monospace" font-size="5" fill="#9aaabd">Netflix</text>
        <text x="95" y="9" text-anchor="end" font-family="monospace" font-size="5" fill="#ff00cc">-SAR 56</text>
      </g>
      <!-- row 2 -->
      <g transform="translate(0,22)">
        <rect width="100" height="14" rx="4" fill="#0a1018"/>
        <circle cx="7" cy="7" r="4" fill="#00a8e8" opacity="0.2"/>
        <text x="7" y="9" text-anchor="middle" font-family="monospace" font-size="5" fill="#00a8e8">S</text>
        <text x="15" y="9" font-family="monospace" font-size="5" fill="#9aaabd">Salary</text>
        <text x="95" y="9" text-anchor="end" font-family="monospace" font-size="5" fill="#00ffcc">+SAR 8.5K</text>
      </g>
      <!-- row 3 -->
      <g transform="translate(0,39)">
        <rect width="100" height="14" rx="4" fill="#0a1018"/>
        <circle cx="7" cy="7" r="4" fill="#ff00cc" opacity="0.2"/>
        <text x="7" y="9" text-anchor="middle" font-family="monospace" font-size="5" fill="#ff00cc">U</text>
        <text x="15" y="9" font-family="monospace" font-size="5" fill="#9aaabd">Uber</text>
        <text x="95" y="9" text-anchor="end" font-family="monospace" font-size="5" fill="#ff00cc">-SAR 24</text>
      </g>
    </g>

    <!-- Bottom nav -->
    <g transform="translate(5,196)">
      <rect width="110" height="18" rx="9" fill="#0a1018" stroke="#1a3a55"/>
      <g transform="translate(20,9)">
        <path d="M -4 4 L 0 -2 L 4 4 Z" fill="#00ffcc" filter="url(#glow13)"/>
      </g>
      <g transform="translate(45,9)" stroke="#5a6a7a" stroke-width="1" fill="none">
        <circle r="3"/>
        <line x1="0" y1="0" x2="0" y2="5"/>
      </g>
      <g transform="translate(65,9)" stroke="#5a6a7a" stroke-width="1" fill="none">
        <rect x="-3" y="-3" width="6" height="6" rx="1"/>
      </g>
      <g transform="translate(85,9)" stroke="#5a6a7a" stroke-width="1" fill="none">
        <circle cx="0" cy="-1" r="2"/>
        <path d="M -4 5 Q 0 1 4 5"/>
      </g>
    </g>

    <!-- Home indicator -->
    <rect x="40" y="218" width="40" height="2" rx="1" fill="#5a6a7a"/>
  </g>

  <text x="200" y="290" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#2a3543" letter-spacing="3">MOBILE UI · DARK MODE · NEON ACCENTS</text>
</svg>
