<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="amazon7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#131a22"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="price7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>
    <linearGradient id="prod7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a8e8"/>
    </linearGradient>
    <filter id="glow7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid7" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f1a26" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg7)"/>
  <rect width="400" height="300" fill="url(#grid7)"/>

  <!-- banner -->
  <g transform="translate(20,30)">
    <rect width="360" height="240" rx="8" fill="url(#amazon7)" stroke="#1a2433" stroke-width="1"/>
    <!-- top strip -->
    <rect x="0" y="0" width="360" height="6" rx="3" fill="url(#price7)" filter="url(#glow7)"/>
    <rect x="0" y="3" width="360" height="3" fill="#ff00cc"/>
    <!-- amazon-style arrow logo placeholder -->
    <g transform="translate(20,22)">
      <text x="0" y="14" font-family="'Arial Black', sans-serif" font-size="15" font-weight="900" fill="#e6f0ff" letter-spacing="0">store.</text>
      <path d="M 60 14 Q 75 22 95 14" stroke="#00a8e8" stroke-width="2" fill="none" stroke-linecap="round"/>
      <polygon points="93,11 99,14 93,18" fill="#00a8e8"/>
    </g>

    <!-- SALE badge -->
    <g transform="translate(260,30)" filter="url(#glow7)">
      <polygon points="35,0 70,18 70,52 35,70 0,52 0,18" fill="none" stroke="url(#price7)" stroke-width="2"/>
      <polygon points="35,8 62,21 62,49 35,62 8,49 8,21" fill="url(#price7)" opacity="0.15"/>
      <text x="35" y="35" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="16" font-weight="900" fill="#ff00cc">SALE</text>
      <text x="35" y="50" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="14" font-weight="900" fill="#ffffff">50%</text>
    </g>

    <!-- product image placeholder -->
    <g transform="translate(30,75)">
      <rect width="130" height="130" rx="6" fill="#0a1018" stroke="#1a2433"/>
      <!-- product silhouette (headphones) -->
      <g transform="translate(65,70)" filter="url(#glow7)">
        <path d="M -45 5 Q -45 -40 0 -40 Q 45 -40 45 5" stroke="url(#prod7)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <rect x="-52" y="0" width="14" height="28" rx="6" fill="url(#prod7)"/>
        <rect x="38" y="0" width="14" height="28" rx="6" fill="url(#prod7)"/>
        <ellipse cx="-45" cy="14" rx="5" ry="8" fill="#00ffcc" opacity="0.5"/>
        <ellipse cx="45" cy="14" rx="5" ry="8" fill="#00ffcc" opacity="0.5"/>
      </g>
      <!-- corner ticks -->
      <g stroke="#1a3a55" stroke-width="1" fill="none">
        <path d="M 5 5 L 5 12 M 5 5 L 12 5"/>
        <path d="M 125 5 L 125 12 M 125 5 L 118 5"/>
        <path d="M 5 125 L 5 118 M 5 125 L 12 125"/>
        <path d="M 125 125 L 125 118 M 125 125 L 118 125"/>
      </g>
    </g>

    <!-- product info -->
    <g transform="translate(180,80)">
      <text x="0" y="0" font-family="'Share Tech Mono', monospace" font-size="7" fill="#5a6a7a" letter-spacing="1">BESTSELLER</text>
      <g fill="#e6f0ff">
        <rect x="0" y="8" width="160" height="7"/>
        <rect x="0" y="20" width="120" height="6"/>
      </g>
      <!-- rating stars -->
      <g transform="translate(0,38)" fill="#00ffcc" filter="url(#glow7)">
        <polygon points="0,0 3,2 6,0 5,4 6,7 3,6 0,7 1,4"/>
        <polygon points="9,0 12,2 15,0 14,4 15,7 12,6 9,7 10,4"/>
        <polygon points="18,0 21,2 24,0 23,4 24,7 21,6 18,7 19,4"/>
        <polygon points="27,0 30,2 33,0 32,4 33,7 30,6 27,7 28,4"/>
        <polygon points="36,0 39,2 42,0 41,4 42,7 39,6 36,7 37,4"/>
      </g>
      <text x="50" y="44" font-family="monospace" font-size="6" fill="#5a6a7a">(2,847)</text>
      <!-- price -->
      <text x="0" y="68" font-family="'Arial Black', sans-serif" font-size="9" fill="#5a6a7a" text-decoration="line-through">SAR 499.00</text>
      <text x="0" y="86" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="url(#price7)" filter="url(#glow7)">SAR 249</text>
      <text x="0" y="98" font-family="monospace" font-size="6" fill="#00ffcc">SAVE 50% · LIMITED</text>
      <!-- CTA button -->
      <rect x="0" y="110" width="120" height="24" rx="4" fill="url(#price7)" filter="url(#glow7)"/>
      <text x="60" y="126" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="10" font-weight="900" fill="#ffffff">ADD TO CART</text>
    </g>
  </g>
  <!-- bottom label -->
  <text x="200" y="290" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#2a3543" letter-spacing="3">PRODUCT AD · E-COMMERCE BANNER</text>
</svg>
